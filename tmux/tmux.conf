# ─── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Core Settings ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1              # start windows at 1, not 0
set -g pane-base-index 1         # start panes at 1, not 0
set -g renumber-windows on       # reorder windows when one is closed
set -g history-limit 10000       # scrollback buffer
set -sg escape-time 0            # no delay for escape key (critical for neovim)
set -g mouse on                  # mouse support

# ─── Splits ───────────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Navigation ───────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Resize ───────────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Reload Config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Status Bar ───────────────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-left "#[fg=colour4,bold] #S  "
set -g status-right "#[fg=colour8]%H:%M "

# ─── Copy Mode (Vim Keys) ─────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
